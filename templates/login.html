<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — Clínica Padre Pío</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-bg">
<div class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-lg login-card">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="login-icon mb-3">
          <i class="bi bi-heart-pulse-fill text-primary" style="font-size:3rem"></i>
        </div>
        <h3 class="fw-bold text-primary">Clínica Dental</h3>
        <h5 class="text-muted">Padre Pío</h5>
        <p class="text-muted small">Sistema de Gestión de Citas</p>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-sm">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">DNI / Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" name="dni" class="form-control" placeholder="Ingrese su DNI" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="contrasena" id="pw" class="form-control" placeholder="Contraseña" required>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePw()">
              <i class="bi bi-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
        </button>
      </form>
      <hr class="my-4">
      <div class="text-center small text-muted">
        <p class="mb-1"><strong>Acceso de demostración:</strong></p>
        <p class="mb-0">DNI: <code>00000000</code> | Contraseña: <code>admin123</code></p>
      </div>
    </div>
  </div>
</div>
<script>
function togglePw() {
  const pw = document.getElementById('pw');
  const icon = document.getElementById('eye-icon');
  if (pw.type === 'password') { pw.type = 'text'; icon.className = 'bi bi-eye-slash'; }
  else { pw.type = 'password'; icon.className = 'bi bi-eye'; }
}
</script>
</body>
</html>
