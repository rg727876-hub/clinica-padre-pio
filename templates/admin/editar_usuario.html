{% extends 'base.html' %}
{% block title %}Editar Usuario{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('admin_usuarios') }}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
  <h2 class="fw-bold mb-0"><i class="bi bi-pencil-fill me-2 text-primary"></i>Editar Usuario</h2>
</div>
<div class="card shadow-sm border-0" style="max-width:700px">
  <div class="card-body p-4">
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-semibold">DNI</label>
          <input type="text" class="form-control bg-light" value="{{ user.dni }}" disabled>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Rol *</label>
          <select name="rol" id="select-rol" class="form-select" onchange="toggleDoctor()">
            {% for r in ['administrador','recepcionista','doctor','cajero'] %}
            <option value="{{ r }}" {% if user.rol==r %}selected{% endif %}>{{ r|title }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Nombres *</label>
          <input type="text" name="nombres" class="form-control" value="{{ user.nombres }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Apellidos *</label>
          <input type="text" name="apellidos" class="form-control" value="{{ user.apellidos }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Correo *</label>
          <input type="email" name="correo" class="form-control" value="{{ user.correo }}" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Teléfono</label>
          <input type="text" name="telefono" class="form-control" value="{{ user.telefono or '' }}">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Estado</label>
          <select name="estado" class="form-select">
            <option value="activo" {% if user.estado=='activo' %}selected{% endif %}>Activo</option>
            <option value="inactivo" {% if user.estado=='inactivo' %}selected{% endif %}>Inactivo</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-semibold">Nueva contraseña <small class="text-muted">(dejar vacío para no cambiar)</small></label>
          <input type="password" name="nueva_contrasena" class="form-control" minlength="6">
        </div>
        <div class="col-md-6 doctor-field {% if user.rol != 'doctor' %}d-none{% endif %}">
          <label class="form-label fw-semibold">Especialidad</label>
          <input type="text" name="especialidad" class="form-control" value="{{ user.especialidad or '' }}">
        </div>
        <div class="col-12 doctor-field {% if user.rol != 'doctor' %}d-none{% endif %}">
          <label class="form-label fw-semibold">Servicios que realiza</label>
          <div class="row g-2">
            {% for s in servicios %}
            <div class="col-md-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="servicios" value="{{ s.id }}"
                       id="srv{{ s.id }}" {% if s.id in seleccionados %}checked{% endif %}>
                <label class="form-check-label" for="srv{{ s.id }}">{{ s.nombre }}</label>
              </div>
            </div>
            {% endfor %}
          </div>
        </div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-2"></i>Guardar cambios</button>
        <a href="{{ url_for('admin_usuarios') }}" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function toggleDoctor() {
  const rol = document.getElementById('select-rol').value;
  document.querySelectorAll('.doctor-field').forEach(el => {
    el.classList.toggle('d-none', rol !== 'doctor');
  });
}
</script>
{% endblock %}
